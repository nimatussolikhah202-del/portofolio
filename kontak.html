<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Ni'matus Solikhah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-6 md:p-12 min-h-screen flex items-center">
    <div class="max-w-6xl mx-auto w-full grid md:grid-cols-2 gap-16 bg-white p-8 md:p-16 rounded-3xl shadow-xl">
        
        <!-- Info Kontak -->
        <div>
            <h2 class="text-4xl font-bold mb-6 text-gray-900">Mari Berdiskusi</h2>
            <p class="text-gray-600 mb-12 text-lg">Saya selalu terbuka untuk peluang kolaborasi, proyek menarik, atau sekadar berbagi ide kreatif.</p>
            
            <div class="space-y-6">
                <div class="flex items-center gap-6 group">
                    <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">
                        <i class="fas fa-envelope text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-400 font-bold uppercase tracking-wider">Email</p>
                        <a href="mailto:contact@nimatus.com" class="text-lg font-bold text-gray-800 hover:text-indigo-600 transition-colors">contact@nimatus.com</a>
                    </div>
                </div>
                <div class="flex items-center gap-6 group">
                    <div class="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all">
                        <i class="fab fa-linkedin text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-400 font-bold uppercase tracking-wider">LinkedIn</p>
                        <a href="https://linkedin.com" target="_blank" class="text-lg font-bold text-gray-800 hover:text-blue-600 transition-colors">Ni'matus Solikhah</a>
                    </div>
                </div>
                <div class="flex items-center gap-6 group">
                    <div class="w-14 h-14 bg-gray-100 text-gray-900 rounded-2xl flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all">
                        <i class="fab fa-github text-xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-400 font-bold uppercase tracking-wider">GitHub</p>
                        <a href="https://github.com" target="_blank" class="text-lg font-bold text-gray-800 hover:text-black transition-colors">nimatus-solikhah</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulir -->
        <div class="bg-gray-50 p-8 md:p-10 rounded-2xl border border-gray-100">
            <form onsubmit="event.preventDefault(); document.getElementById('success').classList.remove('hidden');" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nama Lengkap</label>
                    <input type="text" class="w-full p-4 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" value="Ni'matus Solikhah" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Alamat Email</label>
                    <input type="email" class="w-full p-4 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" placeholder="email@contoh.com" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Pesan Anda</label>
                    <textarea rows="4" class="w-full p-4 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all" placeholder="Tuliskan ide atau pertanyaan Anda di sini..." required></textarea>
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 hover:shadow-xl transition-all">
                    Kirim Sekarang
                </button>
            </form>
            <div id="success" class="hidden mt-6 p-4 bg-green-100 text-green-700 rounded-xl font-bold text-center">
                <i class="fas fa-check-circle mr-2"></i> Pesan terkirim! (Simulasi)
            </div>
        </div>

        <div class="md:col-span-2 mt-4 text-center">
            <a href="about.html" class="text-gray-400 hover:text-indigo-600 transition-colors font-medium">
                &larr; Kembali ke Beranda Profil
            </a>
        </div>
    </div>
</body>
</html>
